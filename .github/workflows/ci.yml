name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Xcode build artifacts
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-cache-deriveddata-${{ github.workflow }}-${{ github.sha }}
          restore-keys: xcode-cache-deriveddata-${{ github.workflow }}-
          swiftpm-cache-key: xcode-cache-sourcepackages-${{ hashFiles('**/Package.resolved') }}
          swiftpm-cache-restore-keys: xcode-cache-sourcepackages-
          delete-used-deriveddata-cache: true

      - name: Lint (SwiftLint)
        run: swiftlint --strict

      - name: Build (Debug)
        run: |
          set -o pipefail && xcodebuild build \
            -scheme SnapOCR \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            | xcbeautify --renderer github-actions

      - name: Build (Release)
        run: |
          set -o pipefail && xcodebuild build \
            -scheme SnapOCR \
            -destination 'platform=macOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            | xcbeautify --renderer github-actions

      - name: Test
        env:
          RESULT_BUNDLE_PATH: ${{ runner.temp }}/TestResults
        run: |
          set -o pipefail && xcodebuild test \
            -scheme SnapOCR \
            -destination 'platform=macOS' \
            -parallel-testing-enabled YES \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            | xcbeautify --renderer github-actions

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ runner.temp }}/TestResults
          retention-days: 7
