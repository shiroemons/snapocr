name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  APP_NAME: SnapOCR
  SCHEME: SnapOCR

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
          fi
          xcodebuild -version

      - name: Install dependencies
        run: brew install create-dmg

      - name: Setup Sparkle
        run: |
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz \
            -o "$RUNNER_TEMP/Sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle-tools"
          tar xf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle-tools"
          echo "$RUNNER_TEMP/sparkle-tools/bin" >> $GITHUB_PATH

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup keychain
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DEVELOPER_ID_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/certificate.p12"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build
        run: |
          set -o pipefail && xcodebuild build \
            -scheme "$SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application" \
            "DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}" \
            "OTHER_CODE_SIGN_FLAGS=--keychain $KEYCHAIN_PATH" \
            -skipPackagePluginValidation \
            | xcbeautify

      - name: Code sign
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release/$APP_NAME.app"
          IDENTITY="Developer ID Application"

          # Extract entitlements from the built app
          codesign -d --entitlements :- "$APP_PATH" > "$RUNNER_TEMP/entitlements.plist"

          # 1. Sign Sparkle XPC Services
          find "$APP_PATH/Contents/Frameworks/Sparkle.framework" -name "*.xpc" -type d | while read xpc; do
            codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" "$xpc"
          done

          # 2. Sign Sparkle Autoupdate helper
          AUTOUPDATE="$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          if [ -d "$AUTOUPDATE" ]; then
            codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" "$AUTOUPDATE"
          fi

          # 3. Sign Sparkle framework
          codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework"

          # 4. Sign the app bundle with entitlements (must be last)
          codesign --force --options runtime --entitlements "$RUNNER_TEMP/entitlements.plist" \
            --sign "$IDENTITY" --keychain "$KEYCHAIN_PATH" "$APP_PATH"

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/$APP_NAME.zip"

          xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="$RUNNER_TEMP/$APP_NAME-$VERSION.dmg"

          # create-dmg exits with code 2 for non-fatal icon-positioning issues
          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 175 190 \
            --app-drop-link 425 190 \
            "$DMG_PATH" \
            "$APP_PATH" || test $? -eq 2

          # Notarize the DMG
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      - name: Sparkle sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | sign_update "$DMG_PATH" --ed-key-file -)
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV

      - name: Generate appcast
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASES_DIR="$RUNNER_TEMP/releases"
          mkdir -p "$RELEASES_DIR"
          cp "$DMG_PATH" "$RELEASES_DIR/"

          # Download previous release DMGs to enable delta update generation
          gh release list --limit 5 --json tagName -q '.[].tagName' | while read -r tag; do
            [ "$tag" = "${GITHUB_REF_NAME}" ] && continue
            gh release download "$tag" -D "$RELEASES_DIR" -p "*.dmg" 2>/dev/null || true
          done

          # Fetch release notes from the GitHub Release body
          gh release view "${GITHUB_REF_NAME}" --json body -q '.body' \
            > "$RELEASES_DIR/$APP_NAME-$VERSION.html" 2>/dev/null || true

          # Generate the appcast
          echo "$SPARKLE_PRIVATE_KEY" | generate_appcast "$RELEASES_DIR" \
            --ed-key-file - \
            --download-url-prefix "${{ github.server_url }}/${{ github.repository }}/releases/download/v$VERSION/"

          echo "RELEASES_DIR=$RELEASES_DIR" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Re-create release with assets
          gh release delete "${GITHUB_REF_NAME}" --yes --cleanup-tag 2>/dev/null || true
          ASSETS=("$DMG_PATH")
          for delta in "$RELEASES_DIR"/*.delta; do
            [ -f "$delta" ] && ASSETS+=("$delta")
          done
          gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" --generate-notes

      - name: Deploy appcast
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/appcast_deploy_key
          chmod 600 ~/.ssh/appcast_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          GIT_SSH_COMMAND="ssh -i ~/.ssh/appcast_deploy_key" \
            git clone git@github.com:shiroemons/appcast.git "$RUNNER_TEMP/appcast-deploy"

          cp "$RELEASES_DIR/appcast.xml" "$RUNNER_TEMP/appcast-deploy/snapocr/appcast.xml"

          cd "$RUNNER_TEMP/appcast-deploy"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapocr/appcast.xml
          git diff --cached --quiet || git commit -m "chore: update SnapOCR appcast for v$VERSION"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/appcast_deploy_key" git push

          rm -f ~/.ssh/appcast_deploy_key

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          # Clone homebrew-tap
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/shiroemons/homebrew-tap.git" \
            "$RUNNER_TEMP/homebrew-tap"
          cd "$RUNNER_TEMP/homebrew-tap"

          # Generate updated Cask file
          cat > Casks/snapocr.rb <<EOF
          cask "snapocr" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/shiroemons/snapocr/releases/download/v#{version}/SnapOCR-#{version}.dmg"
            name "SnapOCR"
            desc "OCR screen text via global hotkey and copy to clipboard"
            homepage "https://github.com/shiroemons/snapocr"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :tahoe"

            app "SnapOCR.app"

            zap trash: [
              "~/Library/Application Support/SnapOCR",
              "~/Library/Preferences/com.shiroemons.snapocr.plist",
              "~/Library/Caches/com.shiroemons.snapocr",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/snapocr.rb
          git commit -m "chore: update SnapOCR to v$VERSION"
          git push

      - name: Cleanup
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
