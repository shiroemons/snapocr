# SwiftLint Configuration for SnapOCR
# https://github.com/realm/SwiftLint

# Paths to include
included:
  - SnapOCR
  - SnapOCRTests

# Paths to exclude
excluded:
  - .build
  - DerivedData
  - Pods
  - Carthage

# Rules
disabled_rules:
  - trailing_comma

opt_in_rules:
  - sorted_imports
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - empty_count
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

# Rule configurations
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - i
    - x
    - y
    - id

nesting:
  type_level: 2
  function_level: 3

reporter: xcode
